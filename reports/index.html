<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>QA Agent Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
    .card { background: white; padding: 24px; border-radius: 12px; max-width: 800px; }
    .passed { color: green; font-weight: bold; }
    .failed { color: red; font-weight: bold; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    td, th { border: 1px solid #ddd; padding: 12px; }
    th { background: #eee; text-align: left; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🤖 QA Agent Report</h1>
    <p><strong>Feature:</strong> Login</p>
    <p><strong>Status:</strong> <span class="passed">PASSED</span></p>

    <table>
      <tr><th>Metric</th><th>Value</th></tr>
      <tr><td>Total Tests</td><td>4</td></tr>
      <tr><td>Duration</td><td>13.15s</td></tr>
      <tr><td>Generated At</td><td>14.6.2026, 14:17:41</td></tr>
    </table>

    <h2>Test Cases</h2>
    <ul>
      <li>Valid Login</li><li>Invalid Password</li><li>Invalid Username</li><li>Empty Fields</li>
    </ul>
  </div>
</body>
</html>
